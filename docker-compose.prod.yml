services:
  # Proxy de seguridad que traduce el dialecto Docker v1.24 (Traefik) al v1.54 (Servidor)
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: ats_socket_proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      POST: 0
    networks:
      - ats_network

  reverse-proxy:
    image: traefik:v3.1
    container_name: ats_proxy
    depends_on:
      - socket-proxy
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=cristes25@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
    restart: unless-stopped
    networks:
      - ats_network

  auth-service:
    build: ./microservices/auth-service
    container_name: applik_auth_prod
    env_file: .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`api.applik-ni.com`) && PathPrefix(`/api/v1/auth`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=myresolver"
      - "traefik.http.services.auth.loadbalancer.server.port=3001"
    networks:
      - ats_network

  job-service:
    build: ./microservices/job-service
    container_name: applik_job_prod
    env_file: .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.job.rule=Host(`api.applik-ni.com`) && PathPrefix(`/api/v1/jobs`)"
      - "traefik.http.routers.job.entrypoints=websecure"
      - "traefik.http.routers.job.tls.certresolver=myresolver"
      - "traefik.http.services.job.loadbalancer.server.port=3003"
    networks:
      - ats_network

  talent-service:
    build: ./microservices/talent-service
    container_name: applik_talent_prod
    env_file: .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.talent.rule=Host(`api.applik-ni.com`) && PathPrefix(`/api/v1/talents`)"
      - "traefik.http.routers.talent.entrypoints=websecure"
      - "traefik.http.routers.talent.tls.certresolver=myresolver"
      - "traefik.http.services.talent.loadbalancer.server.port=3002"
    networks:
      - ats_network

  ai-service:
    build: ./microservices/ai-service
    container_name: applik_ai_prod
    env_file: .env
    restart: unless-stopped
    networks:
      - ats_network

  postgres:
    image: ankane/pgvector:v0.5.0
    container_name: ats_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: talent_platform_prod
    volumes:
      - ./postgres_data_prod:/var/lib/postgresql/data
    networks:
      - ats_network

networks:
  ats_network:
    driver: bridge
